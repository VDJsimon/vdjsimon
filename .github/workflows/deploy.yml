name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pages: write
      administration: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Clean previous build
        run: rm -rf dist

      - name: Build project
        run: npm run build

      - name: Print run info
        run: |
          echo "GITHUB_RUN_ID=$GITHUB_RUN_ID"
          echo "GITHUB_RUN_NUMBER=$GITHUB_RUN_NUMBER"
          echo "GITHUB_RUN_ATTEMPT=$GITHUB_RUN_ATTEMPT"

      - name: Verify dist folder
        run: |
          echo 'Listing dist:'
          ls -la dist || true
      - name: Create CNAME in dist
        run: echo "demo.the-fifth.app" > dist/CNAME

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          user_name: "github-actions[bot]"
          user_email: "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Configure GitHub Pages source
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GH_PAGES_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            await github.request('PUT /repos/{owner}/{repo}/pages', {
              owner,
              repo,
              source: { branch: 'gh-pages', path: '/' }
            });
            console.log('GitHub Pages source set to gh-pages');
